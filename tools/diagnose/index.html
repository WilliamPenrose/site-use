<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>site-use anti-detection diagnostic</title>
<style>
  :root { --bg: #0f1117; --fg: #e6edf3; --pass: #3fb950; --fail: #f85149; --warn: #d29922; --info: #58a6ff; --card: #161b22; --border: #30363d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
         background: var(--bg); color: var(--fg); padding: 40px 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  th { color: #8b949e; font-size: 0.85rem; text-transform: uppercase; }
  .pass { color: var(--pass); }
  .fail { color: var(--fail); }
  .warn { color: var(--warn); }
  .info { color: var(--info); }
  #status { margin-top: 16px; font-size: 0.9rem; color: #8b949e; }
</style>
</head>
<body>
<div class="container">
  <h1>Anti-Detection Diagnostic</h1>
  <table>
    <thead><tr><th>Check</th><th>Expected</th><th>Actual</th><th>Status</th></tr></thead>
    <tbody id="results"></tbody>
  </table>
  <div id="status">Running checks...</div>
  <div style="min-height: 2000px" aria-hidden="true"></div>
</div>
<script src="checks.js"></script>
</body>
</html>
